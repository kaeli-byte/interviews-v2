name: Backend Deploy

on:
  push:
    branches:
      - main
      - dockerize-backend-deploy
    paths:
      - "backend/**"
      - "api/**"
      - "Dockerfile"
      - "docker-compose.yml"
      - "requirements.txt"
      - ".github/workflows/backend-deploy.yml"

env:
  PYTHON_VERSION: "3.13"
  DEFAULT_DEPLOY_BRANCH: "dockerize-backend-deploy"

jobs:
  lint_backend:
    name: lint_backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: pip install uv

      - name: Create virtual environment
        run: uv venv .venv

      - name: Install backend dependencies
        shell: bash
        run: |
          source .venv/bin/activate
          uv pip install -r requirements.txt
          uv pip install ruff

      - name: Run backend ruff
        shell: bash
        run: |
          source .venv/bin/activate
          ruff check backend api

  test_backend:
    name: test_backend
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test_file:
          - tests/test_auth.py
          - tests/test_agents.py
          - tests/test_sessions.py
          - tests/test_documents.py
          - tests/test_perf.py
          - tests/test_profiles_service.py
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: pip install uv

      - name: Create virtual environment
        run: uv venv .venv

      - name: Install backend dependencies
        shell: bash
        run: |
          source .venv/bin/activate
          uv pip install -r requirements.txt
          uv pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run backend tests
        shell: bash
        run: |
          source .venv/bin/activate
          pytest "${{ matrix.test_file }}" -q

  smoke_backend_startup:
    name: smoke_backend_startup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: pip install uv

      - name: Create virtual environment
        run: uv venv .venv

      - name: Install backend dependencies
        shell: bash
        run: |
          source .venv/bin/activate
          uv pip install -r requirements.txt

      - name: Verify FastAPI starts
        shell: bash
        run: |
          source .venv/bin/activate
          timeout 10 uvicorn backend.main:app --host 0.0.0.0 --port 8000 || [ $? -eq 124 ]

  smoke_backend_container_build:
    name: smoke_backend_container_build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t interview-backend:test .

  deploy_prod_backend:
    name: deploy_prod_backend
    needs:
      - lint_backend
      - test_backend
      - smoke_backend_startup
      - smoke_backend_container_build
    runs-on: ubuntu-latest
    steps:
      - name: Validate production VPS configuration
        env:
          PROD_VPS_HOST: ${{ secrets.PROD_VPS_HOST }}
          PROD_VPS_USER: ${{ secrets.PROD_VPS_USER }}
          PROD_VPS_SSH_KEY: ${{ secrets.PROD_VPS_SSH_KEY }}
          PROD_VPS_DEPLOY_PATH: ${{ secrets.PROD_VPS_DEPLOY_PATH }}
          PROD_VPS_BRANCH: ${{ secrets.PROD_VPS_BRANCH }}
        run: |
          for var in PROD_VPS_HOST PROD_VPS_USER PROD_VPS_SSH_KEY PROD_VPS_DEPLOY_PATH; do
            if [ -z "${!var}" ]; then
              echo "ERROR: $var is required for production deployments"
              exit 1
            fi
          done

      - name: Deploy production backend to VPS
        env:
          PROD_VPS_HOST: ${{ secrets.PROD_VPS_HOST }}
          PROD_VPS_USER: ${{ secrets.PROD_VPS_USER }}
          PROD_VPS_SSH_KEY: ${{ secrets.PROD_VPS_SSH_KEY }}
          PROD_VPS_DEPLOY_PATH: ${{ secrets.PROD_VPS_DEPLOY_PATH }}
          PROD_VPS_BRANCH: ${{ secrets.PROD_VPS_BRANCH }}
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$PROD_VPS_SSH_KEY" > /tmp/prod_vps_key
          chmod 600 /tmp/prod_vps_key
          ssh-keyscan -H "$PROD_VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          DEPLOY_BRANCH="${PROD_VPS_BRANCH:-$DEFAULT_DEPLOY_BRANCH}"

          ssh -i /tmp/prod_vps_key "$PROD_VPS_USER@$PROD_VPS_HOST" 'bash -se' <<EOF2
          set -euo pipefail
          cd "$PROD_VPS_DEPLOY_PATH"
          git fetch origin "$DEPLOY_BRANCH"
          git checkout "$DEPLOY_BRANCH"
          git reset --hard "origin/$DEPLOY_BRANCH"
          mkdir -p uploads
          test -f docker-compose.yml
          test -f /etc/ai-interview/backend.env
          docker compose up -d --build
          docker compose ps
          curl --fail --silent --show-error "http://127.0.0.1:8000/health" > /dev/null
          EOF2

  post_deploy_smoke:
    name: post_deploy_smoke
    needs:
      - deploy_prod_backend
    runs-on: ubuntu-latest
    steps:
      - name: Check production backend health
        run: curl -fsSL "http://${{ secrets.PROD_VPS_HOST }}:8000/health" > /dev/null
